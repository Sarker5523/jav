<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Details - VideoHub</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>

  <link rel="stylesheet" href="styles.css">

  <style>
    :root {
      --color-back: #1a1a1a;
    }

    .button {
      background: var(--color-back);
      border-radius: 0.5em;
      box-shadow: inset 0px -6px 18px -6px rgba(3, 15, 20, 0), inset rgba(54, 69, 75, 1) -1px -1px 6px 0px, inset 12px 0px 12px -6px rgba(3, 15, 20, 0), inset -12px 0px 12px -6px rgba(3, 15, 20, 0), rgb(55, 72, 78) -1px -1px 6px 0px;
      border: solid 2px #030f14;
      cursor: pointer;
      font-size: 16px;
      padding: 0.4em 0.9em;
      outline: none;
      transition: all 0.3s;
      user-select: none;
      display: inline-block;
      min-width: 100px;
      margin: 0 12px;
    }

    .button:hover {
      box-shadow: inset 0px -6px 18px -6px rgba(3, 15, 20, 1), inset 0px 6px 18px -6px rgba(3, 15, 20, 1), inset 12px 0px 12px -6px rgba(3, 15, 20, 0), inset -12px 0px 12px -6px rgba(3, 15, 20, 0), -1px -1px 6px 0px rgb(0, 153, 255);
    }

    .button:active {
      box-shadow: inset 0px -12px 12px -6px rgba(3, 15, 20, 1), inset 0px 12px 12px -6px rgba(3, 15, 20, 1), inset 12px 0px 12px -6px rgba(3, 15, 20, 1), inset -12px 0px 12px -6px rgba(3, 15, 20, 1), -1px -1px 6px 0px rgb(0, 153, 255);
    }

    .text {
      color: #d0a756;
      font-weight: 700;
      margin: auto;
      transition: all 0.3s;
      width: fit-content;
    }

    .button:hover .text {
      transform: scale(0.9);
    }

    .button:active .text {
      transform: scale(0.8);
    }

    .button.active {
      box-shadow: inset 0px -6px 18px -6px rgba(3, 15, 20, 1), inset 0px 6px 18px -6px rgba(3, 15, 20, 1), inset 12px 0px 12px -6px rgba(3, 15, 20, 0), inset -12px 0px 12px -6px rgba(3, 15, 20, 0), -1px -1px 6px 0px rgb(0, 153, 255);
    }

    .button.active .text {
      transform: scale(0.9);
    }

    .embed-container,
    .abyss-embed,
    .stream-player-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      margin-top: 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      background-color: #000;
    }

    .embed-iframe,
    .abyss-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .stream-player-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }
  </style>

  <!-- Navbar -->
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #111827;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    nav {
      background-color: #1f2937;
      border-bottom: 1px solid #374151;
    }
  </style>
</head>

<body class="bg-gray-900">

  <!-- ==================== NAVBAR WITH HAMBURGER ==================== -->
  <nav class="bg-gray-800 border-b border-gray-700">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
      <a href="index.html" class="flex items-center space-x-3">
        <img src="https://flowbite.com/docs/images/logo.svg" class="h-8 w-auto" alt="VideoHub Logo" />
        <span class="self-center text-2xl font-semibold whitespace-nowrap">VideoHub</span>
      </a>


      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="site.html" class="hover:text-green-400">Sites</a>
        <a href="performer.html" class="hover:text-green-400">Performers</a>
      </div>

      <!-- Hamburger -->
      <button id="hamburger-btn" class="md:hidden p-2 text-gray-400 hover:text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-gray-800 border-t border-gray-700">
      <div class="flex flex-col p-4 space-y-4 text-sm">
        <a href="site.html" class="hover:text-green-400 py-2">Sites</a>
        <a href="performer.html" class="hover:text-green-400 py-2">Performers</a>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto p-4">
    <div id="video-details">Loading video details...</div>
  </div>

  <script>
    // ====================== XHR for Tizen 3 ======================
    function loadJson(url) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'json';
        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            resolve(xhr.response || JSON.parse(xhr.responseText || '[]'));
          } else {
            reject(new Error(`HTTP ${xhr.status}`));
          }
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.send();
      });
    }

    const datasets = {
      irl: { scenes: 'scene_details.json', performers: 'performer.json', sites: 'site.json' },
      jav: { scenes: 'scene_details_jav.json', performers: 'performer_jav.json', sites: 'site_jav.json' }
    };

    let currentDataset = localStorage.getItem('selectedDataset') || 'irl';
    let allScenes = [], performersById = {}, performersByName = {}, sitesById = {};

    const videoDetails = document.getElementById('video-details');

    async function loadData() {
      const ds = datasets[currentDataset];
      videoDetails.innerHTML = '<p class="text-gray-400 text-center py-12">Loading data...</p>';

      try {
        const [sceneRes, perfRes, siteRes] = await Promise.all([
          loadJson(ds.scenes),
          loadJson(ds.performers),
          loadJson(ds.sites)
        ]);

        performersById = {}; performersByName = {};
        perfRes.forEach(p => {
          if (p && p.name) {
            const clean = p.name.trim().toLowerCase();
            performersByName[clean] = p;
            if (p._id) performersById[p._id] = p;
          }
        });

        sitesById = {};
        siteRes.forEach(s => {
          if (s && s.id !== undefined && s.name) sitesById[s.id] = s;
        });

        allScenes = sceneRes || [];
        renderVideo();
      } catch (err) {
        console.error(err);
        videoDetails.innerHTML = `
          <p class="text-red-400 text-center py-12">
            Failed to load data.<br>
            <small>${err.message || err}</small><br><br>
            <button onclick="location.reload()" class="px-6 py-2 bg-green-700 rounded">Retry</button>
          </p>`;
      }
    }

    function findScene(identifier) {
      if (!identifier) return null;
      return allScenes.find(item => {
        const d = item.data || {};
        return String(d._id || '') === identifier ||
          (item.slug || '') === identifier ||
          (item.video_id || '') === identifier;
      });
    }

    function isStreamFile(url) {
      if (!url) return false;
      const u = url.toLowerCase();
      return u.includes('.ts') || u.includes('.m3u8') || u.includes('/hls/') || u.includes('/playlist');
    }

    function createStreamPlayer(streamUrl, thumbnail) {
      const id = 'stream-' + Math.random().toString(36).substr(2, 9);
      let html = `<div class="stream-player-container" id="${id}"><video id="v-${id}" controls autoplay style="width:100%;height:100%;background:#000;"></video></div>`;

      setTimeout(() => {
        const container = document.getElementById(id);
        const videoEl = document.getElementById('v-' + id);
        if (!container || !videoEl) return;

        if (typeof mpegts === 'undefined') {
          container.innerHTML = `<p class="text-red-400 p-8 text-center">Player not supported on this TV.</p>`;
          return;
        }

        const isHLS = streamUrl.toLowerCase().includes('.m3u8');
        const player = mpegts.createPlayer({
          type: isHLS ? 'hls' : 'mpegts',
          url: streamUrl,
          cors: true
        });

        player.attachMediaElement(videoEl);
        player.load().catch(err => console.error(err));
        if (thumbnail) videoEl.poster = thumbnail;
      }, 200);

      return html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function renderVideo() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');

      if (!id) {
        videoDetails.innerHTML = '<p class="text-red-400 text-center py-12">No video ID found in URL.</p>';
        return;
      }

      const sceneItem = findScene(id);
      if (!sceneItem) {
        videoDetails.innerHTML = `<p class="text-red-400 text-center py-12">Video with ID "<b>${id}</b>" not found.</p>`;
        return;
      }

      const d = sceneItem.data || {};

      // Build performers list
      let performersHtml = 'Unknown';
      if (d.performers) {
        const perfList = Array.isArray(d.performers) ? d.performers : [d.performers];
        performersHtml = perfList.map(perf => {
          if (perf && perf.name) return escapeHtml(perf.name);
          if (perf && perf.parent && perf.parent._id) {
            const p = performersById[perf.parent._id];
            return p ? escapeHtml(p.name) : 'Unknown';
          }
          return 'Unknown';
        }).join(', ');
      }

      const site = d.site && d.site.id ? sitesById[d.site.id] : null;

      // Collect playable sources
      const sources = [];
      if (d.embeds) {
        Object.entries(d.embeds).forEach(([key, url]) => {
          if (url && typeof url === 'string' && url.startsWith('http')) {
            sources.push({ name: key.charAt(0).toUpperCase() + key.slice(1), url: url.trim() });
          }
        });
      }
      if (sceneItem.slug) sources.push({ name: 'Abyss', url: `https://short.icu/${sceneItem.slug}` });
      if (sceneItem.video_id) sources.push({ name: 'UPNShare', url: `https://purn.upn.one/#${sceneItem.video_id}` });

      if (sources.length === 0) {
        videoDetails.innerHTML = '<p class="text-red-400 text-center py-12">No playable sources available for this video.</p>';
        return;
      }

      const defaultSrc = sources[0];

      let trailerHtml = '';
      if (d.trailer) {
        if (isStreamFile(d.trailer)) {
          trailerHtml = createStreamPlayer(d.trailer, d.background?.full);
        } else {
          trailerHtml = `<div class="embed-container"><iframe src="${d.trailer}" class="embed-iframe" allowfullscreen frameborder="0"></iframe></div>`;
        }
      }

      const switcherHtml = sources.length > 1 ? `
        <div id="source-switcher" class="flex flex-wrap justify-center gap-3 my-6">
          ${sources.map((s, i) => `
            <button data-index="${i}" class="button ${i === 0 ? 'active' : ''}">
              ${escapeHtml(s.name)}
            </button>
          `).join('')}
        </div>` : '';

      videoDetails.innerHTML = `
        <div class="embed-container">
          <iframe src="${defaultSrc.url}" class="embed-iframe" frameborder="0" allowfullscreen allow="autoplay"></iframe>
        </div>
        ${switcherHtml}
        <h1 class="text-2xl font-bold mt-6 mb-3">${escapeHtml(d.title || 'Untitled Video')}</h1>
        <p class="text-gray-300 mb-6">${escapeHtml(d.description || 'No description available.')}</p>
        <p class="text-sm text-gray-400">Studio: ${site ? escapeHtml(site.name) : 'Unknown'}</p>
        <p class="text-sm text-gray-400">Performers: ${performersHtml}</p>
        ${trailerHtml}
      `;

      // Source switcher
      setTimeout(() => {
        document.querySelectorAll('#source-switcher button').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.index);
            const newUrl = sources[idx].url;

            const oldFrame = document.querySelector('.embed-container');
            if (oldFrame) {
              oldFrame.innerHTML = `<iframe src="${newUrl}" class="embed-iframe" frameborder="0" allowfullscreen allow="autoplay"></iframe>`;
            }

            document.querySelectorAll('#source-switcher button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          });
        });
      }, 300);
    }

    // Hamburger Menu
    document.addEventListener('DOMContentLoaded', () => {
      const hamburger = document.getElementById('hamburger-btn');
      const mobileMenu = document.getElementById('mobile-menu');

      hamburger.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });

      // Load the video
      loadData();
    });
  </script>
</body>

</html>
