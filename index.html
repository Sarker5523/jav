<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoHub</title>

  <!-- Strongly recommended: Download flowbite files and use local paths for Tizen 3 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>

  <style>
    .checkbox-wrapper-8 .tgl { display: none; }
    .checkbox-wrapper-8 .tgl+.tgl-btn {
      outline: 0; display: block; width: 4em; height: 2em; position: relative;
      cursor: pointer; user-select: none;
    }
    .checkbox-wrapper-8 .tgl+.tgl-btn:after,
    .checkbox-wrapper-8 .tgl+.tgl-btn:before {
      position: relative; display: block; content: ""; width: 50%; height: 100%;
    }
    .checkbox-wrapper-8 .tgl+.tgl-btn:after { left: 0; }
    .checkbox-wrapper-8 .tgl:checked+.tgl-btn:after { left: 50%; }
    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn {
      overflow: hidden; transform: skew(-10deg); transition: all 0.2s ease; background: #888;
    }
    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:after,
    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:before {
      transform: skew(10deg); display: inline-block; transition: all 0.2s ease;
      width: 100%; text-align: center; position: absolute; line-height: 2em;
      font-weight: bold; color: #fff;
    }
    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:after { left: 100%; content: attr(data-tg-on); }
    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:before { left: 0; content: attr(data-tg-off); }
    .checkbox-wrapper-8 .tgl-skewed:checked+.tgl-btn { background: #86d993; }
    .checkbox-wrapper-8 .tgl-skewed:checked+.tgl-btn:before { left: -100%; }
    .checkbox-wrapper-8 .tgl-skewed:checked+.tgl-btn:after { left: 0; }

    body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #111827; color: #fff; margin: 0; padding: 0; }
    .actress-box {
      position: absolute; font-size: 0.7em; top: 4px; left: 2px;
      background: rgba(0,0,0,0.55); padding: 3px 5px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1); z-index: 10;
    }
    .video-list-container { max-width: 1920px; margin: 0 auto; padding: 16px; }
    .video-item {
      background: transparent; border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6); transition: all 0.3s ease; position: relative;
    }
    .video-item:hover { transform: translateY(-8px) scale(1.03); }
    .video-item img { width: 100%; height: auto; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; }
  </style>
</head>
<body class="bg-gray-900">

  <nav class="bg-gray-800 border-b border-gray-700">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
      <a href="index.html" class="flex items-center space-x-3">
        <img src="https://flowbite.com/docs/images/logo.svg" class="h-8 w-auto" alt="VideoHub Logo" />
        <span class="self-center text-2xl font-semibold">VideoHub</span>
      </a>

      <div class="checkbox-wrapper-8">
        <input type="checkbox" id="data-toggle" class="tgl tgl-skewed">
        <label for="data-toggle" data-tg-off="IRL" data-tg-on="JAV" class="tgl-btn"></label>
      </div>

      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="site.html">Sites</a>
        <a href="performer.html">Performers</a>
      </div>

      <div class="relative hidden md:block w-80">
        <input type="text" id="search-navbar" 
               class="block w-full p-2 ps-10 text-sm bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400"
               placeholder="Search videos..." oninput="debouncedSearch()">
      </div>
    </div>
  </nav>

  <div class="video-list-container">
    <div class="pagination" id="pagination-top"></div>
    <div class="video-list" id="video-list">Loading videos...</div>
    <div class="pagination" id="pagination-bottom"></div>
  </div>

  <script>
    const itemsPerPage = 12;
    let allVideos = [];
    let filteredVideos = [];
    let currentPage = 1;
    const videoList = document.getElementById('video-list');
    const paginationTop = document.getElementById('pagination-top');
    const paginationBottom = document.getElementById('pagination-bottom');
    let performersById = {};
    let searchTimeout = null;

    const datasets = {
      irl: { scenes: 'scene_details.json', performers: 'performer.json' },
      jav: { scenes: 'scene_details_jav.json', performers: 'performer_jav.json' }
    };

    let currentDataset = localStorage.getItem('selectedDataset') || 'irl';
    const toggle = document.getElementById('data-toggle');
    toggle.checked = currentDataset === 'jav';

    toggle.addEventListener('change', () => {
      currentDataset = toggle.checked ? 'jav' : 'irl';
      localStorage.setItem('selectedDataset', currentDataset);
      currentPage = 1;
      loadAllData();
    });

    function loadJson(url) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'json';
        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            resolve(xhr.response || JSON.parse(xhr.responseText || '[]'));
          } else {
            reject(new Error(`HTTP ${xhr.status}`));
          }
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.send();
      });
    }

    async function loadAllData() {
      const ds = datasets[currentDataset];
      videoList.innerHTML = '<p class="col-span-full text-center py-12 text-gray-400">Loading videos...</p>';

      try {
        const [sceneRes, perfRes] = await Promise.all([loadJson(ds.scenes), loadJson(ds.performers)]);

        performersById = {};
        perfRes.forEach(p => { if (p && p._id) performersById[p._id] = p; });

        allVideos = sceneRes.map(item => {
          const d = item.data || {};
          const title = (d.title && typeof d.title === 'string') ? d.title.trim() : 'Untitled Video';
          const linkId = d._id ? String(d._id) : (item.slug || item.video_id || 'unknown');
          let actressName = 'Unknown';

          const perfArray = Array.isArray(d.performers) ? d.performers : (d.performers ? [d.performers] : []);
          for (const perf of perfArray) {
            if (perf?.name) { actressName = perf.name.trim(); break; }
            if (perf?.parent?._id) {
              const p = performersById[perf.parent._id];
              if (p && p.name) { actressName = p.name; break; }
            }
          }

          return { linkId, title, thumbnail: d.background?.full || 'https://via.placeholder.com/300x200?text=No+Image', actressName };
        }).filter(v => v.linkId);

        allVideos.reverse();
        filteredVideos = [...allVideos];
        renderCurrentPage();
        renderPagination();
      } catch (err) {
        console.error(err);
        videoList.innerHTML = `
          <div class="col-span-full text-center p-8 text-red-400">
            Failed to load videos.<br>
            <small>${err.message || err}</small><br><br>
            <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-green-700 rounded">Retry</button>
          </div>`;
      }
    }

    function renderCurrentPage() {
      videoList.innerHTML = '';
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageVideos = filteredVideos.slice(start, end);

      if (!pageVideos.length) {
        videoList.innerHTML = '<p class="col-span-full text-center py-12 text-gray-400">No videos found.</p>';
        return;
      }

      pageVideos.forEach(v => {
        const div = document.createElement('div');
        div.className = 'video-item group relative';
        div.innerHTML = `
          <a href="video.html?id=${encodeURIComponent(v.linkId)}">
            <img src="${v.thumbnail}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
            <h3 class="mt-2 px-1 text-sm font-medium line-clamp-2">${escapeHtml(v.title)}</h3>
            <div class="actress-box">${escapeHtml(v.actressName)}</div>
          </a>`;
        videoList.appendChild(div);
      });
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
      if (totalPages <= 1) {
        paginationTop.innerHTML = paginationBottom.innerHTML = '';
        return;
      }

      const createPagination = () => {
        const frag = document.createDocumentFragment();

        // First
        const first = document.createElement('a'); first.href = "#"; first.textContent = "« First";
        first.onclick = (e) => { e.preventDefault(); changePage(1); }; frag.appendChild(first);

        // Prev
        const prev = document.createElement('a'); prev.href = "#"; prev.textContent = "Prev";
        prev.onclick = (e) => { e.preventDefault(); changePage(currentPage - 1); }; frag.appendChild(prev);

        // Page numbers
        const start = Math.max(1, currentPage - 2);
        const end = Math.min(totalPages, currentPage + 2);
        for (let i = start; i <= end; i++) {
          const a = document.createElement('a');
          a.href = "#";
          a.textContent = i;
          if (i === currentPage) a.style.fontWeight = 'bold';
          a.onclick = (e) => { e.preventDefault(); changePage(i); };
          frag.appendChild(a);
        }

        // Next
        const next = document.createElement('a'); next.href = "#"; next.textContent = "Next";
        next.onclick = (e) => { e.preventDefault(); changePage(currentPage + 1); }; frag.appendChild(next);

        // Last
        const last = document.createElement('a'); last.href = "#"; last.textContent = "Last »";
        last.onclick = (e) => { e.preventDefault(); changePage(totalPages); }; frag.appendChild(last);

        return frag;
      };

      paginationTop.innerHTML = '';
      paginationBottom.innerHTML = '';
      paginationTop.appendChild(createPagination());
      paginationBottom.appendChild(createPagination());
    }

    function changePage(newPage) {
      const totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
      if (newPage < 1 || newPage > totalPages) return;
      currentPage = newPage;
      window.history.pushState({page: newPage}, '', `?page=${newPage}`);
      renderCurrentPage();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function debouncedSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const query = (document.getElementById('search-navbar').value || '').trim().toLowerCase();
        if (!query) {
          filteredVideos = [...allVideos];
        } else {
          filteredVideos = allVideos.filter(v =>
            (v.title || '').toLowerCase().includes(query) ||
            (v.actressName || '').toLowerCase().includes(query)
          );
        }
        currentPage = 1;
        renderCurrentPage();
        renderPagination();
      }, 300);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadAllData();
    });

    window.addEventListener('popstate', (event) => {
      currentPage = event.state?.page || 1;
      renderCurrentPage();
      renderPagination();
    });

    const urlParams = new URLSearchParams(window.location.search);
    currentPage = parseInt(urlParams.get('page')) || 1;
  </script>
</body>
</html>
