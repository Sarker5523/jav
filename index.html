<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://cdnjs.cloudflare.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' https:;
    media-src 'self' https:;
    connect-src 'self' https:;
  ">

  <title>VideoHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
  <style>
    .checkbox-wrapper-8 .tgl {
      display: none;
    }

    .checkbox-wrapper-8 .tgl,
    .checkbox-wrapper-8 .tgl:after,
    .checkbox-wrapper-8 .tgl:before,
    .checkbox-wrapper-8 .tgl *,
    .checkbox-wrapper-8 .tgl *:after,
    .checkbox-wrapper-8 .tgl *:before,
    .checkbox-wrapper-8 .tgl+.tgl-btn {
      box-sizing: border-box;
    }

    .checkbox-wrapper-8 .tgl::-moz-selection,
    .checkbox-wrapper-8 .tgl:after::-moz-selection,
    .checkbox-wrapper-8 .tgl:before::-moz-selection,
    .checkbox-wrapper-8 .tgl *::-moz-selection,
    .checkbox-wrapper-8 .tgl *:after::-moz-selection,
    .checkbox-wrapper-8 .tgl *:before::-moz-selection,
    .checkbox-wrapper-8 .tgl+.tgl-btn::-moz-selection,
    .checkbox-wrapper-8 .tgl::selection,
    .checkbox-wrapper-8 .tgl:after::selection,
    .checkbox-wrapper-8 .tgl:before::selection,
    .checkbox-wrapper-8 .tgl *::selection,
    .checkbox-wrapper-8 .tgl *:after::selection,
    .checkbox-wrapper-8 .tgl *:before::selection,
    .checkbox-wrapper-8 .tgl+.tgl-btn::selection {
      background: none;
    }

    .checkbox-wrapper-8 .tgl+.tgl-btn {
      outline: 0;
      display: block;
      width: 4em;
      height: 2em;
      position: relative;
      cursor: pointer;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .checkbox-wrapper-8 .tgl+.tgl-btn:after,
    .checkbox-wrapper-8 .tgl+.tgl-btn:before {
      position: relative;
      display: block;
      content: "";
      width: 50%;
      height: 100%;
    }

    .checkbox-wrapper-8 .tgl+.tgl-btn:after {
      left: 0;
    }

    .checkbox-wrapper-8 .tgl+.tgl-btn:before {
      display: none;
    }

    .checkbox-wrapper-8 .tgl:checked+.tgl-btn:after {
      left: 50%;
    }

    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn {
      overflow: hidden;
      transform: skew(-10deg);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transition: all 0.2s ease;
      font-family: sans-serif;
      background: #888;
    }

    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:after,
    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:before {
      transform: skew(10deg);
      display: inline-block;
      transition: all 0.2s ease;
      width: 100%;
      text-align: center;
      position: absolute;
      line-height: 2em;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.4);
    }

    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:after {
      left: 100%;
      content: attr(data-tg-on);
    }

    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:before {
      left: 0;
      content: attr(data-tg-off);
    }

    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:active {
      background: #888;
    }

    .checkbox-wrapper-8 .tgl-skewed+.tgl-btn:active:before {
      left: -10%;
    }

    .checkbox-wrapper-8 .tgl-skewed:checked+.tgl-btn {
      background: #86d993;
    }

    .checkbox-wrapper-8 .tgl-skewed:checked+.tgl-btn:before {
      left: -100%;
    }

    .checkbox-wrapper-8 .tgl-skewed:checked+.tgl-btn:after {
      left: 0;
    }

    .checkbox-wrapper-8 .tgl-skewed:checked+.tgl-btn:active:after {
      left: 10%;
    }
  </style>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #111827;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .actress-box {
      position: absolute;
      font-size: 0.7em;
      top: 4px;
      left: 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      padding: 3px 5px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .video-list-container {
      max-width: 1920px;
      margin: 0 auto;
      padding: 16px;
    }


    .video-item {
      background-color: transparent;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
      transition: all 0.3s ease;
      position: relative;
    }

    .video-item:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.8);
    }

    .video-item img {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 12px;
    }

    .search-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: #374151;
      border: 1px solid #4b5563;
      border-radius: 0.5rem;
      margin-top: 0.25rem;
      max-height: 320px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.4);
    }

    /* Pagination */
  </style>
</head>

<body class="bg-gray-900">

  <!-- ==================== NAVBAR ==================== -->
  <nav class="bg-gray-800 border-b border-gray-700">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
      <a href="index.html" class="flex items-center space-x-3">
        <img src="https://flowbite.com/docs/images/logo.svg" class="h-8 w-auto" alt="VideoHub Logo" />
        <span class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white">VideoHub</span>
      </a>

      <!-- IRL / JAV Toggle -->
      <div class="checkbox-wrapper-8">
        <input type="checkbox" id="data-toggle" class="tgl tgl-skewed">
        <label for="data-toggle" data-tg-off="IRL" data-tg-on="JAV" class="tgl-btn"></label>
      </div>

      <div class="flex items-center gap-4">
        <!-- Desktop Search -->
        <div class="relative hidden md:block w-80">
          <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="m21 21-6-6m2-5a7 7 0 01-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input type="text" id="search-navbar"
            class="block w-full p-2 ps-10 text-sm bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-green-500 focus:border-green-500"
            placeholder="Search videos..." oninput="debouncedSearch()">
          <div id="search-suggestions" class="search-suggestions hidden"></div>
        </div>

        <button data-collapse-toggle="navbar-search" type="button" class="md:hidden p-2 text-gray-400 hover:text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>

      <!-- Navigation Links -->
      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="site.html" class="hover:text-green-400 transition-colors">Sites</a>
        <a href="performer.html" class="hover:text-green-400 transition-colors">Performers</a>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div class="hidden w-full md:hidden" id="navbar-search">
      <div class="p-4">
        <div class="relative">
          <input type="text" id="search-navbar-mobile"
            class="block w-full p-3 ps-10 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400"
            placeholder="Search videos..." oninput="debouncedSearch()">
          <div id="search-suggestions-mobile" class="search-suggestions hidden mt-2"></div>
        </div>
        <div class="flex flex-col gap-3 mt-4 text-sm">
          <a href="site.html" class="hover:text-green-400">Sites</a>
          <a href="performer.html" class="hover:text-green-400">Performers</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ==================== VIDEO GRID + PAGINATION ==================== -->
  <div class="video-list-container">
    <div class="pagination" id="pagination-top"></div>

    <div class="video-list" id="video-list">
      Loading videos...
    </div>

    <div class="pagination" id="pagination-bottom"></div>
  </div>

  <script defer>
    const itemsPerPage = 12;
    let allVideos = [];
    let filteredVideos = [];
    let currentPage = 1;

    const videoList = document.getElementById('video-list');
    const paginationTop = document.getElementById('pagination-top');
    const paginationBottom = document.getElementById('pagination-bottom');

    let performersById = {};
    let searchTimeout = null;

    const datasets = {
      irl: { scenes: 'scene_details.json', performers: 'performer.json' },
      jav: { scenes: 'scene_details_jav.json', performers: 'performer_jav.json' }
    };

    let currentDataset = localStorage.getItem('selectedDataset') || 'irl';
    const toggle = document.getElementById('data-toggle');
    toggle.checked = currentDataset === 'jav';

    // Toggle IRL/JAV
    toggle.addEventListener('change', () => {
      currentDataset = toggle.checked ? 'jav' : 'irl';
      localStorage.setItem('selectedDataset', currentDataset);
      currentPage = 1;
      loadAllData();
    });

    async function loadAllData() {
      const ds = datasets[currentDataset];
      videoList.innerHTML = '<p class="col-span-full text-center py-12 text-gray-400">Loading videos...</p>';

      try {
        const [sceneRes, perfRes] = await Promise.all([
          fetch(ds.scenes).then(r => r.ok ? r.json() : []),
          fetch(ds.performers).then(r => r.ok ? r.json() : [])
        ]);

        performersById = {};
        perfRes.forEach(p => { if (p._id) performersById[p._id] = p; });

        allVideos = sceneRes.map(item => {
          const d = item.data || {};
          const title = (d.title && typeof d.title === 'string') ? d.title.trim() : 'Untitled Video';
          const linkId = d._id ? String(d._id) : (item.slug || item.video_id || 'unknown');

          let actressName = 'Unknown';
          const perfArray = Array.isArray(d.performers) ? d.performers : (d.performers ? [d.performers] : []);
          const allPerformerIds = [];

          for (const perf of perfArray) {
            if (perf?.name) {
              actressName = perf.name.trim();
              break;
            }
            if (perf?.parent?._id) {
              allPerformerIds.push(perf.parent._id);
              const p = performersById[perf.parent._id];
              if (p && p.name) {
                actressName = p.name;
                break;
              }
            }
          }

          return {
            linkId,
            title,
            thumbnail: d.background?.full || 'https://via.placeholder.com/300x200?text=No+Image',
            actressName,
            allPerformerIds
          };
        }).filter(v => v.linkId);

        allVideos.reverse();
        filteredVideos = [...allVideos];
        renderCurrentPage();
        renderPagination();
      } catch (err) {
        videoList.innerHTML = `<div class="col-span-full text-center p-8 text-red-400">Failed to load videos.<br><button onclick="location.reload()" class="mt-4 px-6 py-2 bg-green-700 rounded">Retry</button></div>`;
      }
    }

    function renderCurrentPage() {
      videoList.innerHTML = '';

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageVideos = filteredVideos.slice(start, end);

      if (!pageVideos.length) {
        videoList.innerHTML = '<p class="col-span-full text-center py-12 text-gray-400">No videos found.</p>';
        return;
      }

      pageVideos.forEach(v => {
        const div = document.createElement('div');
        div.className = 'video-item group relative';
        div.innerHTML = `
          <a href="video.html?id=${encodeURIComponent(v.linkId)}">
            <img src="${v.thumbnail}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
            <h3 class="mt-2 px-1 text-sm font-medium line-clamp-2">${escapeHtml(v.title)}</h3>
            <div class="actress-box">${escapeHtml(v.actressName)}</div>
          </a>`;
        videoList.appendChild(div);
      });
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
      if (totalPages <= 1) {
        paginationTop.innerHTML = paginationBottom.innerHTML = '';
        return;
      }

      const createPagination = () => {
        const frag = document.createDocumentFragment();

        // First Button
        const first = document.createElement('a');
        first.href = "#";
        first.textContent = "« First";
        first.onclick = (e) => { e.preventDefault(); changePage(1); };
        frag.appendChild(first);

        // Prev Button
        const prev = document.createElement('a');
        prev.href = "#";
        prev.textContent = "Prev";
        prev.onclick = (e) => { e.preventDefault(); changePage(currentPage - 1); };
        frag.appendChild(prev);

        // Page Numbers
        const start = Math.max(1, currentPage - 2);
        const end = Math.min(totalPages, currentPage + 2);

        for (let i = start; i <= end; i++) {
          const a = document.createElement('a');
          a.href = "#";
          a.textContent = i;
          if (i === currentPage) a.className = 'active';
          a.onclick = (e) => { e.preventDefault(); changePage(i); };
          frag.appendChild(a);
        }

        // Next Button
        const next = document.createElement('a');
        next.href = "#";
        next.textContent = "Next";
        next.onclick = (e) => { e.preventDefault(); changePage(currentPage + 1); };
        frag.appendChild(next);

        // Last Button
        const last = document.createElement('a');
        last.href = "#";
        last.textContent = "Last »";
        last.onclick = (e) => { e.preventDefault(); changePage(totalPages); };
        frag.appendChild(last);

        return frag;
      };

      paginationTop.innerHTML = '';
      paginationBottom.innerHTML = '';
      paginationTop.appendChild(createPagination());
      paginationBottom.appendChild(createPagination());
    }

    function changePage(newPage) {
      const totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
      if (newPage < 1 || newPage > totalPages) return;

      currentPage = newPage;
      renderCurrentPage();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function debouncedSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const query = (document.getElementById('search-navbar').value ||
          document.getElementById('search-navbar-mobile').value || '').trim().toLowerCase();

        if (!query) {
          filteredVideos = [...allVideos];
        } else {
          filteredVideos = allVideos.filter(v =>
            v.title.toLowerCase().includes(query) ||
            v.actressName.toLowerCase().includes(query)
          );
        }

        currentPage = 1;
        renderCurrentPage();
        renderPagination();
      }, 300);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadAllData();
    });
  </script>
</body>

</html>
